libinfo:
  name: admm 
  version: ${BRANCH}+${COMMIT_DATE}.${COMMIT_HASH}

build:
  tool:
    common: cmd
  cmd_config:
    - |
      pyvers = ["9", "10", "11", "12", "13"]
      for pyver in pyvers:
        ver = "py3{}".format(pyver)
        run_command_with_conda(ver, ["pip", "uninstall", "admm", "-y"])
        run_command_with_conda(ver, ["pip", "install", "-r", "requirements.txt"])
        run_command_with_conda(ver, ["python", "-m", "build", "-n", "-w"])
