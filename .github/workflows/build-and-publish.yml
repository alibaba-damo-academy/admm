name: Build and Publish

on:
  push:
    branches:
      - main
  
  release:
    types: [published]
  
  workflow_dispatch:
    inputs:
      upload_to_pypi:
        description: 'Upload to PyPI (true) or build artifacts only (false)'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - macos-14
          - windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@v2.21.1
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux2014"
          CIBW_MANYLINUX_I686_IMAGE: "manylinux2014"
          CIBW_MANYLINUX_AARCH64_IMAGE: "manylinux2014"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_MACOS: "arm64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_BEFORE_BUILD: "pip install cython>=0.29.0 setuptools>=61 numpy>=1.20.0 stubgen-pyx wheel admmlib"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "LD_LIBRARY_PATH=$(python -c 'import admmlib, os; print(os.path.join(os.path.dirname(admmlib.__file__), \"lib\"))'):$LD_LIBRARY_PATH auditwheel repair --exclude libadmm.so -w {dest_dir} {wheel}"
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: "DYLD_LIBRARY_PATH=$(python -c 'import admmlib, os; print(os.path.join(os.path.dirname(admmlib.__file__), \"lib\"))'):$DYLD_LIBRARY_PATH delocate-wheel --require-archs {delocate_archs} --exclude libadmm.dylib -w {dest_dir} -v {wheel}"
          # CIBW_TEST_REQUIRES: "pytest"
          # CIBW_TEST_COMMAND: "pytest {project}/tests"
          CIBW_SKIP: "*-win32 *-manylinux_i686"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 7

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build sdist
        run: |
          python -m pip install build
          python -m build --sdist --outdir dist/

      - name: Verify sdist
        run: |
          pip install twine
          twine check dist/*

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-distribution
          path: dist/*.tar.gz
          retention-days: 7

  publish-to-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'push' || github.event.inputs.upload_to_pypi == 'true'
    
    environment:
      name: pypi
      url: https://pypi.org/p/admm
    
    permissions:
      id-token: write

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Download source distribution
        uses: actions/download-artifact@v4
        with:
          name: source-distribution
          path: dist/

      - name: List all distributions
        run: |
          ls -la dist/
          echo "---"
          echo "Total files: $(ls dist/ | wc -l)"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.ADMM_PUBLISH }}
          verbose: true
          print-hash: true

  attach-to-release:
    name: Attach wheels to GitHub Release
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Download source distribution
        uses: actions/download-artifact@v4
        with:
          name: source-distribution
          path: dist/

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
