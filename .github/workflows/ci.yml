name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build package
        run: |
          pip install . --no-build-isolation

      - name: Run unit tests
        run: |
          pytest tests/test_ut.py -v

      - name: Run documentation tests
        run: |
          pytest tests/test_doc.py -v

      - name: Run UDF tests
        run: |
          pytest tests/test_udf.py -v

      - name: Run ADMM application tests
        run: |
          pytest tests/test_admm.py -v

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 src/admm --count --select=E9,F63,F7,F82 --show-source --statistics --exclude='*.pyx,*.pxd,*.pxi'
          flake8 src/admm --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude='*.pyx,*.pxd,*.pxi'

  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . -r requirements.txt

      - name: Build documentation
        run: |
          cd docs
          python -c "import genrst; genrst.writeRst()"
          python -m sphinx -T -j auto -b dirhtml ./ _build/html
        continue-on-error: false
